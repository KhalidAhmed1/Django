<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Khaled's Kitchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f0f2f5;
      padding: 36px 48px;
      color: #1e1e2e;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1e1e2e;
    }
    h1 span { color: #e85d2f; }

    /* ── FORM ── */
    form {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    input[type="text"],
    select,
    button {
      font-family: 'Poppins', sans-serif;
      font-size: 13.5px;
      height: 38px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1.5px solid #d4d4d8;
      outline: none;
      transition: border-color .2s;
    }

    input[type="text"] {
      min-width: 200px;
      background: #fff;
      color: #1e1e2e;
    }
    input[type="text"]::placeholder { color: #a1a1aa; }
    input[type="text"]:focus,
    select:focus { border-color: #e85d2f; }

    select { background: #fff; color: #1e1e2e; cursor: pointer; }

    button {
      background: #e85d2f;
      color: #fff;
      border-color: #e85d2f;
      font-weight: 600;
      cursor: pointer;
      padding: 0 20px;
      transition: background .2s;
    }
    button:hover { background: #c94d22; border-color: #c94d22; }

    /* ── CARD ── */
    .dish-card {
      background: #fff;
      border-radius: 12px;
      padding: 22px 24px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      margin-bottom: 16px;
      max-width: 780px;
      border-left: 5px solid #e85d2f;
      transition: transform .2s, box-shadow .2s;
    }
    .dish-card:hover {
      transform: translateX(4px);
      box-shadow: 0 4px 18px rgba(0,0,0,.11);
    }

    .dish-card h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1e1e2e;
    }

    .dish-card p {
      font-size: 14px;
      color: #52525b;
      margin: 6px 0;
    }
    .dish-card p b { color: #1e1e2e; }

    .available,
    .unavailable {
      display: inline-block;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .available   { background: #dcfce7; color: #16a34a; }
    .unavailable { background: #fee2e2; color: #dc2626; }

    /* ── EMPTY ── */
    .empty {
      font-size: 15px;
      color: #71717a;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      body { padding: 24px 16px; }
      input[type="text"] { min-width: 100%; }
    }
  </style>
</head>
<body>

  <h1>Khaled's Kitchen <span>🍽️</span></h1>

  <form method="GET" action="">
    <input type="text" name="keyword" placeholder="Search dishes…" value="{{ keyword }}">
    <select name="category">
      <option value="">All Categories</option>
      {% for cat in categories %}
        <option value="{{ cat }}" {% if selected_category == cat %}selected{% endif %}>{{ cat }}</option>
      {% endfor %}
    </select>
    <button type="submit">Search</button>
  </form>

  {% for food in foods %}
  <div class="dish-card">
    <h2>{{ food.name }}</h2>
    <p>Category: <b>{{ food.category }}</b></p>
    <p>Price: <b>{{ food.price }} EGP</b></p>
    {% if food.available %}
      <div class="available">Available ✅</div>
    {% else %}
      <div class="unavailable">Unavailable ❌</div>
    {% endif %}
  </div>
  {% empty %}
    <p class="empty">No dishes found.</p>
  {% endfor %}

</body>
</html>
