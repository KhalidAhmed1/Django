{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <a href="{% url 'student_list' %}" style="color:#64748b;text-decoration:none">← Students</a>
  <h1>{{ page_title }}</h1>
</div>

<div class="form-card card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="first_name" value="{{ student.user.first_name|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="last_name" value="{{ student.user.last_name|default:'' }}" required>
        </div>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" value="{{ student.user.email|default:'' }}" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Level</label>
          <select name="level">
            {% for val, label in level_choices %}
            <option value="{{ val }}" {% if student.level == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" value="{{ student.phone|default:'' }}">
        </div>
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" name="date_of_birth" value="{{ student.date_of_birth|default:'' }}">
      </div>

      {% if not student %}
      <p class="form-hint" style="margin-bottom:1rem">⚠️ Default password will be <strong>changeme123</strong>. Change it in admin.</p>
      {% endif %}

      <div style="display:flex;gap:.75rem">
        <button type="submit" class="btn btn-primary">
          {% if student %}Save Changes{% else %}Enroll Student{% endif %}
        </button>
        <a href="{% url 'student_list' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
