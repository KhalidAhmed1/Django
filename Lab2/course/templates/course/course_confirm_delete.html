{% extends "base.html" %}
{% block content %}
<div style="max-width:480px;margin:3rem auto">
  <div class="danger-box card">
    <div class="card-body" style="text-align:center">
      <h2 style="color:#ef4444;margin-bottom:1rem">🗑️ Delete Course</h2>
      <p style="margin-bottom:1.5rem">Are you sure you want to delete <strong>{{ course.title }}</strong>?<br>
      <small style="color:#64748b">All student enrollments for this course will also be removed.</small></p>
      <form method="post" style="display:inline-flex;gap:.75rem;justify-content:center">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'course_detail' course.pk %}" class="btn btn-outline">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
